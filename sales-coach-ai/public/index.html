<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Sales Coach AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    .screen {
      display: none;
      height: 100vh;
      width: 100vw;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* Start screen */
    #start-screen {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    #start-screen h1 {
      font-size: 28px;
      font-weight: 700;
    }
    #start-screen .subtitle {
      color: #666;
      font-size: 16px;
      margin-top: 12px;
    }
    #start-btn {
      margin-top: 48px;
      border-radius: 999px;
      background: #fff;
      color: #0a0a0a;
      border: none;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    #start-error {
      margin-top: 24px;
      color: #ff5b5b;
      font-size: 14px;
      display: none;
    }

    /* Live screen */
    #live-screen { padding-top: 48px; }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
    }
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff3b30;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    .live-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }
    #end-btn {
      background: transparent;
      border: 1px solid #ff3b30;
      color: #ff3b30;
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Suggestion card */
    #suggestion-card {
      flex: 6;
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }
    #suggestion-text {
      color: #fff;
      font-size: 20px;
      line-height: 1.5;
      text-align: center;
      opacity: 1;
      transition: opacity 300ms ease;
    }
    #suggestion-text.placeholder { color: #444; }

    /* Transcript section */
    #transcript-section {
      flex: 4;
      background: #111;
      border-radius: 12px;
      margin: 0 16px 16px;
      padding: 16px;
      overflow-y: scroll;
      min-height: 0;
    }
    #transcript-section .label {
      color: #444;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #transcript-text {
      font-size: 14px;
      line-height: 1.6;
    }
    #transcript-text .final { color: #888; }
    #transcript-text .interim { color: #555; }

    /* End screen */
    #end-screen {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    #end-screen h1 {
      font-size: 24px;
      font-weight: 700;
    }
    #end-screen .duration {
      color: #888;
      font-size: 16px;
      margin-top: 16px;
    }
    #end-screen .thanks {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
    #restart-btn {
      margin-top: 48px;
      border-radius: 999px;
      background: #fff;
      color: #0a0a0a;
      border: none;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Debug panel */
    #debug-panel {
      flex: 0 0 80px;
      height: 80px;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
      line-height: 1.4;
      overflow-y: scroll;
      padding: 4px 8px;
      margin: 0 16px 16px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div id="start-screen" class="screen active">
    <h1>Sales Coach AI</h1>
    <p class="subtitle">Real-time call assistance</p>
    <button id="start-btn">Start Session</button>
    <p id="start-error">Mic access needed</p>
  </div>

  <div id="live-screen" class="screen">
    <div class="top-bar">
      <div class="live-indicator">
        <span class="pulse-dot"></span>
        <span class="live-text">LIVE</span>
      </div>
      <button id="end-btn">End</button>
    </div>

    <div id="suggestion-card">
      <div id="suggestion-text" class="placeholder">Listening...</div>
    </div>

    <div id="transcript-section">
      <div class="label">Live Transcript</div>
      <div id="transcript-text"></div>
    </div>

    <div id="debug-panel"></div>
  </div>

  <div id="end-screen" class="screen">
    <h1>Session ended</h1>
    <p id="end-duration" class="duration"></p>
    <p class="thanks">Thanks for using Sales Coach AI</p>
    <button id="restart-btn">Start New Session</button>
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const liveScreen = document.getElementById('live-screen');
    const endScreen = document.getElementById('end-screen');

    const startBtn = document.getElementById('start-btn');
    const startError = document.getElementById('start-error');
    const endBtn = document.getElementById('end-btn');
    const restartBtn = document.getElementById('restart-btn');

    const suggestionText = document.getElementById('suggestion-text');
    const transcriptText = document.getElementById('transcript-text');
    const transcriptSection = document.getElementById('transcript-section');
    const endDuration = document.getElementById('end-duration');
    const debugPanel = document.getElementById('debug-panel');

    let ws = null;
    let audioContext = null;
    let mediaStream = null;
    let processor = null;
    let sessionStart = null;
    let interimSpan = null;

    function showScreen(screen) {
      [startScreen, liveScreen, endScreen].forEach((s) => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function debugLog(text) {
      const line = document.createElement('div');
      line.textContent = text;
      debugPanel.appendChild(line);
      debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    function setSuggestion(text) {
      suggestionText.style.opacity = 0;
      setTimeout(() => {
        suggestionText.textContent = text;
        suggestionText.classList.remove('placeholder');
        suggestionText.style.opacity = 1;
      }, 300);
    }

    function appendTranscript(text, isFinal) {
      if (!isFinal) {
        if (!interimSpan) {
          interimSpan = document.createElement('span');
          interimSpan.className = 'interim';
          transcriptText.appendChild(interimSpan);
        }
        interimSpan.textContent = ' ' + text;
      } else {
        if (interimSpan) {
          interimSpan.remove();
          interimSpan = null;
        }
        const span = document.createElement('span');
        span.className = 'final';
        span.textContent = text + ' ';
        transcriptText.appendChild(span);
      }
      transcriptSection.scrollTop = transcriptSection.scrollHeight;
    }

    function formatDuration(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes + ':' + String(seconds).padStart(2, '0');
    }

    async function startSession() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        startError.style.display = 'block';
        return;
      }

      startError.style.display = 'none';
      transcriptText.innerHTML = '';
      debugPanel.innerHTML = '';
      interimSpan = null;
      suggestionText.textContent = 'Listening...';
      suggestionText.classList.add('placeholder');
      suggestionText.style.opacity = 1;
      sessionStart = Date.now();

      showScreen(liveScreen);

      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(protocol + '://' + location.host + '/ws');

      ws.onmessage = (event) => {
        debugLog(event.data.substring(0, 200));

        const msg = JSON.parse(event.data);

        if (msg.type === 'status') {
          // status update received
        }

        if (msg.type === 'transcript') {
          appendTranscript(msg.text, msg.is_final);
        }

        if (msg.type === 'suggestion') {
          setSuggestion(msg.text);
        }

        if (msg.type === 'debug') {
          // already logged above, no further action
        }
      };

      audioContext = new AudioContext({ sampleRate: 16000 });
      const source = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (e) => {
        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(int16.buffer);
        }
      };

      source.connect(processor);
      processor.connect(audioContext.destination);
    }

    function endSession() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop' }));
      }
      if (ws) {
        ws.close();
        ws = null;
      }
      if (processor) {
        processor.disconnect();
        processor.onaudioprocess = null;
        processor = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach((t) => t.stop());
        mediaStream = null;
      }

      endDuration.textContent = sessionStart ? formatDuration(Date.now() - sessionStart) : '';
      showScreen(endScreen);
    }

    startBtn.addEventListener('click', startSession);
    endBtn.addEventListener('click', endSession);
    restartBtn.addEventListener('click', () => showScreen(startScreen));
  </script>
</body>
</html>
