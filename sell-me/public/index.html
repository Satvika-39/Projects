<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sell-me — live mic transcription</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    button { font-size: 16px; padding: 10px 20px; cursor: pointer; }
    #status { margin-left: 12px; color: #666; }
    #transcript { margin-top: 24px; padding: 16px; min-height: 120px; border: 1px solid #ddd; border-radius: 8px; white-space: pre-wrap; line-height: 1.5; }
    .interim { color: #999; }
  </style>
</head>
<body>
  <h1>sell-me</h1>
  <p>Speak into your microphone and watch the live transcript appear below.</p>
  <button id="toggle">Start listening</button>
  <span id="status">idle</span>
  <div id="transcript"></div>

  <script>
    const toggleBtn = document.getElementById('toggle');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');

    let ws = null;
    let audioContext = null;
    let mediaStream = null;
    let workletNode = null;
    let finalTranscript = '';
    let listening = false;

    const PROCESSOR = `
      class PCMProcessor extends AudioWorkletProcessor {
        process(inputs) {
          const input = inputs[0];
          if (input && input[0]) {
            const float32 = input[0];
            const int16 = new Int16Array(float32.length);
            for (let i = 0; i < float32.length; i++) {
              const s = Math.max(-1, Math.min(1, float32[i]));
              int16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
            }
            this.port.postMessage(int16.buffer, [int16.buffer]);
          }
          return true;
        }
      }
      registerProcessor('pcm-processor', PCMProcessor);
    `;

    function renderTranscript(interim) {
      transcriptEl.innerHTML =
        finalTranscript + (interim ? `<span class="interim">${interim}</span>` : '');
    }

    async function start() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = async () => {
        statusEl.textContent = 'connecting to microphone...';

        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext({ sampleRate: 16000 });

        const blob = new Blob([PROCESSOR], { type: 'application/javascript' });
        await audioContext.audioWorklet.addModule(URL.createObjectURL(blob));

        const source = audioContext.createMediaStreamSource(mediaStream);
        workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');

        workletNode.port.onmessage = (event) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(event.data);
          }
        };

        source.connect(workletNode);
        statusEl.textContent = 'listening...';
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.error) {
          statusEl.textContent = `error: ${data.error}`;
          return;
        }
        if (data.isFinal) {
          finalTranscript += data.transcript + ' ';
          renderTranscript('');
        } else {
          renderTranscript(data.transcript);
        }
      };

      ws.onerror = () => {
        statusEl.textContent = 'connection error';
      };

      ws.onclose = () => {
        if (listening) stop();
      };
    }

    function stop() {
      listening = false;
      toggleBtn.textContent = 'Start listening';
      statusEl.textContent = 'idle';

      if (workletNode) workletNode.disconnect();
      if (audioContext) audioContext.close();
      if (mediaStream) mediaStream.getTracks().forEach((track) => track.stop());
      if (ws) ws.close();

      workletNode = null;
      audioContext = null;
      mediaStream = null;
      ws = null;
    }

    toggleBtn.addEventListener('click', async () => {
      if (listening) {
        stop();
        return;
      }
      listening = true;
      toggleBtn.textContent = 'Stop listening';
      finalTranscript = '';
      transcriptEl.textContent = '';
      try {
        await start();
      } catch (err) {
        statusEl.textContent = `error: ${err.message}`;
        stop();
      }
    });
  </script>
</body>
</html>
